---
layout: default
---

<div class="wrapper">
  <div class="page abstract-page">
    <style>
      .abstract-page .post-header {
        text-align: center;
      }

      /* Title */
      .abstract-page .post-title {
        font-size: 1.6rem;
        line-height: 1.25;
        margin-bottom: 0.3rem;
      }

      /* Subtitle */
      .abstract-page .subtitle {
        font-size: 1.3rem;
        line-height: 1.3;
        margin: 0.2rem 0 0.6rem 0;
      }

      /* Authors */
      .abstract-page .authors {
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 1.2rem; /* extra space BEFORE authors */
        margin-bottom: 1rem;
      }

      /* "Abstract" label */
      .abstract-page h3 {
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        margin-top: 1.8rem;
        margin-bottom: 0.6rem;
      }

      /* Poster buttons */
      .poster-buttons {
        display: inline-flex;
        margin: 1rem auto 1.25rem auto;
        border: 1px solid #b8b8b8;
        border-radius: 6px;
        overflow: hidden;
      }

      .poster-buttons a {
        width: 9rem;
        text-align: center;
        padding: 0.55rem 0.75rem;
        box-sizing: border-box;
        text-decoration: none;
        font-size: 0.95rem;
        color: #2f2f2f;
        background: #f7f7f7;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      .poster-buttons a + a {
        border-left: 1px solid #b8b8b8;
      }

      .poster-buttons a:hover {
        background: #ececec;
      }

      .poster-buttons a:active {
        background: #e2e2e2;
      }

      .poster-buttons a:focus {
        outline: none;
        background: #ececec;
      }

      .poster-buttons a:focus-visible {
        outline: 2px solid #888;
        outline-offset: -2px;
      }

      .poster-buttons-wrapper {
        text-align: center;
      }
    </style>

    <header class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>

      {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
      {% endif %} {% if page.authors %}
      <p class="authors">{{ page.authors }}</p>
      {% endif %} {% if page.poster %}
      <div class="poster-buttons">
        <a href="{{ page.poster }}" target="_blank" rel="noopener">View</a>
        <a href="{{ page.poster }}" download>Download</a>
      </div>
      {% endif %}
    </header>

    {% include page_divider.html %}

    <article class="post-content">{{ content }}</article>
  </div>
</div>
